<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Кольца -->
  <circle cx="96" cy="96" r="75" fill="none" stroke="#5288c1" stroke-width="0.5" opacity="0.15"/>
  <circle cx="96" cy="96" r="58" fill="none" stroke="#5288c1" stroke-width="0.5" opacity="0.2"/>
  <circle cx="96" cy="96" r="40" fill="none" stroke="#5288c1" stroke-width="0.8" opacity="0.25"/>

  <!-- Линии основные -->
  <line x1="96" y1="96" x2="34"  y2="96"  stroke="#5288c1" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="58"  y2="50"  stroke="#71a8d8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="134" y2="50"  stroke="#5288c1" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="158" y2="96"  stroke="#71a8d8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="58"  y2="142" stroke="#5288c1" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="134" y2="142" stroke="#71a8d8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="96" y1="96" x2="96"  y2="34"  stroke="#5288c1" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="96" y1="96" x2="96"  y2="158" stroke="#5288c1" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>

  <!-- Линии пунктирные -->
  <line x1="34"  y1="96"  x2="58"  y2="50"  stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="34"  y1="96"  x2="58"  y2="142" stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="58"  y1="50"  x2="134" y2="50"  stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="58"  y1="142" x2="134" y2="142" stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="134" y1="50"  x2="158" y2="96"  stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="134" y1="142" x2="158" y2="96"  stroke="#3a6a96" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Узлы с свечением -->
  <circle cx="96"  cy="96"  r="8"  fill="#5288c1" opacity="0.25" filter="url(#glow)"/>
  <circle cx="34"  cy="96"  r="6"  fill="#5288c1" opacity="0.2"  filter="url(#glow)"/>
  <circle cx="134" cy="50"  r="6"  fill="#5288c1" opacity="0.2"  filter="url(#glow)"/>
  <circle cx="58"  cy="142" r="6"  fill="#5288c1" opacity="0.2"  filter="url(#glow)"/>

  <!-- Узлы основные -->
  <circle cx="96"  cy="96"  r="7"  fill="#0a1628" stroke="#5288c1" stroke-width="2"/>
  <circle cx="96"  cy="96"  r="3.5" fill="#5288c1"/>

  <circle cx="34"  cy="96"  r="5.5" fill="#0a1628" stroke="#5288c1" stroke-width="1.8"/>
  <circle cx="34"  cy="96"  r="2.5" fill="#5288c1"/>

  <circle cx="58"  cy="50"  r="5"  fill="#0a1628" stroke="#71a8d8" stroke-width="1.8"/>
  <circle cx="58"  cy="50"  r="2.5" fill="#71a8d8"/>

  <circle cx="134" cy="50"  r="5.5" fill="#0a1628" stroke="#5288c1" stroke-width="1.8"/>
  <circle cx="134" cy="50"  r="2.5" fill="#5288c1"/>

  <circle cx="158" cy="96"  r="5"  fill="#0a1628" stroke="#71a8d8" stroke-width="1.8"/>
  <circle cx="158" cy="96"  r="2.5" fill="#71a8d8"/>

  <circle cx="58"  cy="142" r="5.5" fill="#0a1628" stroke="#5288c1" stroke-width="1.8"/>
  <circle cx="58"  cy="142" r="2.5" fill="#5288c1"/>

  <circle cx="134" cy="142" r="5"  fill="#0a1628" stroke="#71a8d8" stroke-width="1.8"/>
  <circle cx="134" cy="142" r="2.5" fill="#71a8d8"/>

  <circle cx="96"  cy="34"  r="4"  fill="#0a1628" stroke="#5288c1" stroke-width="1.5"/>
  <circle cx="96"  cy="34"  r="2"  fill="#5288c1" opacity="0.8"/>

  <circle cx="96"  cy="158" r="4"  fill="#0a1628" stroke="#5288c1" stroke-width="1.5"/>
  <circle cx="96"  cy="158" r="2"  fill="#5288c1" opacity="0.8"/>
</svg>
